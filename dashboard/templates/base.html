<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} - Trading System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/static/main.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="h-full bg-slate-900 text-slate-200">
    <div class="flex h-full">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col flex-shrink-0">
            <div class="p-5 border-b border-slate-700">
                <h1 class="text-xl font-bold text-white">Trading System</h1>
                <div class="mt-2">
                    {% if sandbox %}
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-900 text-yellow-300 border border-yellow-700">
                        SANDBOX
                    </span>
                    {% else %}
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-900 text-red-300 border border-red-700 animate-pulse">
                        LIVE
                    </span>
                    {% endif %}
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <a href="/"
                   class="flex items-center px-3 py-2 rounded-lg text-sm font-medium {{ 'bg-slate-700 text-white' if page == 'index' else 'text-slate-400 hover:bg-slate-700 hover:text-white' }} transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Resumen
                </a>
                <a href="/cartera"
                   class="flex items-center px-3 py-2 rounded-lg text-sm font-medium {{ 'bg-slate-700 text-white' if page == 'cartera' else 'text-slate-400 hover:bg-slate-700 hover:text-white' }} transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                    Cartera
                </a>
                <a href="/trades"
                   class="flex items-center px-3 py-2 rounded-lg text-sm font-medium {{ 'bg-slate-700 text-white' if page == 'trades' else 'text-slate-400 hover:bg-slate-700 hover:text-white' }} transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    Trades
                </a>
                <a href="/estrategias"
                   class="flex items-center px-3 py-2 rounded-lg text-sm font-medium {{ 'bg-slate-700 text-white' if page == 'estrategias' else 'text-slate-400 hover:bg-slate-700 hover:text-white' }} transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    Estrategias
                </a>
                <a href="/perfil"
                   class="flex items-center px-3 py-2 rounded-lg text-sm font-medium {{ 'bg-slate-700 text-white' if page == 'perfil' else 'text-slate-400 hover:bg-slate-700 hover:text-white' }} transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                    Perfil de Riesgo
                </a>
                <a href="/research"
                   class="flex items-center px-3 py-2 rounded-lg text-sm font-medium {{ 'bg-slate-700 text-white' if page == 'research' else 'text-slate-400 hover:bg-slate-700 hover:text-white' }} transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                    Research
                </a>
            </nav>
            <div class="p-4 border-t border-slate-700 text-xs text-slate-500" x-data="{ uptime: '...' }"
                 x-init="setInterval(async () => { try { const r = await fetchAPI('/api/estado'); uptime = formatUptime(r.uptime_seconds); } catch(e) {} }, 30000); (async () => { try { const r = await fetchAPI('/api/estado'); uptime = formatUptime(r.uptime_seconds); } catch(e) {} })();">
                <p>Uptime: <span x-text="uptime"></span></p>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-6">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
